name: Web — Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  GODOT_VERSION: 4.3-stable
  TEMPLATE_VERSION: 4.3.stable

jobs:
  build:
    name: Tests + Export Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot + templates
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            ~/godot
            ~/.local/share/godot/export_templates
          key: godot-${{ env.GODOT_VERSION }}-v1

      - name: Install Godot 4.3 + export templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          set -e
          mkdir -p ~/godot
          curl -fL -o /tmp/godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          unzip -o /tmp/godot.zip -d /tmp
          mv "/tmp/Godot_v${GODOT_VERSION}_linux.x86_64" ~/godot/godot
          chmod +x ~/godot/godot
          curl -fL -o /tmp/templates.tpz "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz"
          mkdir -p ~/.local/share/godot/export_templates
          rm -rf /tmp/tpl && mkdir -p /tmp/tpl
          unzip -q /tmp/templates.tpz -d /tmp/tpl
          rm -rf "$HOME/.local/share/godot/export_templates/${TEMPLATE_VERSION}"
          mv /tmp/tpl/templates "$HOME/.local/share/godot/export_templates/${TEMPLATE_VERSION}"

      - name: Add Godot to PATH
        run: echo "$HOME/godot" >> "$GITHUB_PATH"

      - name: Godot version
        run: godot --headless --version

      - name: Import resources (build class cache)
        run: godot --headless --import || true

      - name: Run headless tests
        run: godot --headless res://tests/TestRunner.tscn

      - name: Export Web build
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html

      - name: Verify export output
        run: |
          ls -la build/web
          test -f build/web/index.html
          ls build/web/*.wasm
          ls build/web/*.pck
          touch build/web/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    name: Déploiement GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
